project:
  name: spacex-stock-model
  version: "0.1.0"

data:
  raw_dir: data/raw
  processed_dir: data/processed
  ticker: TSLA
  proxies: [RKLB, BWXT, LMT]
  train_split: 0.8

features:
  sma_windows: [5, 10, 20, 50]
  ema_windows: [12, 16]
  rsi_window: 14
  bollinger_window: 20
  bollinger_std: 2.0

model:
  xgboost:
    n_estimators: 300
    max_depth: 4
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42

evaluation:
  walk_forward_folds: 5
  min_train_size: 252

logging:
  level: INFO
  log_dir: logs